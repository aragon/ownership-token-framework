version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Don't open update PRs for versions newer than this, mirroring pnpm's
    # minimumReleaseAge so freshly (possibly maliciously) published versions
    # age out before we adopt them.
    cooldown:
      default-days: 7
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
