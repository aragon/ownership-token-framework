name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [development, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only reads the repo (checkout) and runs checks.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to full commit SHAs (supply-chain policy)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile fails if the lockfile is out of sync, catching the
        # node_modules/lockfile drift that hid the router regression locally.
        run: pnpm install --frozen-lockfile

      # Decouple guard: the app vendors otf-cms's schemas/composer; fail if the
      # local copy drifts from the pinned upstream.
      - name: Vendored schema integrity
        run: node scripts/check-schema-drift.mjs

      - name: Lint and format check
        run: pnpm exec biome ci .

      - name: Type check
        run: pnpm type-check

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
