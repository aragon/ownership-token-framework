name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile fails if the lockfile is out of sync, catching the
        # node_modules/lockfile drift that hid the router regression locally.
        run: pnpm install --frozen-lockfile

      - name: Lint and format check
        run: pnpm exec biome ci .

      - name: Type check
        run: pnpm type-check

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
