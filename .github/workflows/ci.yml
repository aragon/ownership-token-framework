name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only reads the repo (checkout) and runs checks.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Pinned to a commit SHA (not the mutable v4 tag) per supply-chain policy.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile fails if the lockfile is out of sync, catching the
        # node_modules/lockfile drift that hid the router regression locally.
        run: pnpm install --frozen-lockfile

      - name: Lint and format check
        run: pnpm exec biome ci .

      - name: Type check
        run: pnpm type-check

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
