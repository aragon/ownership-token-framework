name: Release — finalize

# When a "release/*" PR merges to main, tag v<version> and cut a GitHub Release
# whose notes are the CHANGELOG section for that version. Mirrors the Aragon
# release-pr-finalize pattern, trimmed: no Slack/Linear. Needs no 1Password —
# tagging + releasing uses only the built-in token, so this half stores no
# credentials. Production deploy is driven separately by deploy.yml (push to
# main), which fires on the same merge.
#
# This uses github.token, so the Release it creates does not emit a
# `release: published` event to other workflows. That is fine because deploy runs
# on push-to-main. If production deploy is ever moved to trigger on
# `release: published`, create the Release with a bot PAT instead — a
# GITHUB_TOKEN-created Release would not fire it.

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    # Only a merged release branch — not every closed PR.
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      # Policy: a release is sealed once its PR opens. A leftover changeset means
      # someone added scope to an in-flight release — stop and cut a new one.
      - name: Guard — no unconsumed changesets
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "::error title=Unconsumed changesets::A release PR merged with pending .changeset files. Do not add changesets to an open release; start a new release instead."
            exit 1
          fi

      - name: Resolve version + release notes
        id: rel
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          V="$(node -p "require('./package.json').version")"
          TAG="v$V"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          # Extract this version's section from CHANGELOG.md (between "## <v>" and
          # the next "## "). Fall back to autogenerated notes if absent.
          if [ -f CHANGELOG.md ]; then
            awk -v v="$V" '
              $0 ~ "^## +" v "([^0-9]|$)" {grab=1; next}
              grab && /^## / {exit}
              grab {print}
            ' CHANGELOG.md > release-notes.md
          fi
          if [ -s release-notes.md ]; then
            echo "notes=file" >> "$GITHUB_OUTPUT"
          else
            echo "notes=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag + GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
          SHA: ${{ steps.rel.outputs.sha }}
          NOTES: ${{ steps.rel.outputs.notes }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "$TAG already released — nothing to do."
            exit 0
          fi
          if [ "$NOTES" = file ]; then
            gh release create "$TAG" --target "$SHA" --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --target "$SHA" --title "$TAG" --generate-notes
          fi
